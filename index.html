ox-shadow:0 8px 18px rgba(15,23,42,.10);border:1px solid #dbe2ea;margin:0}.action-title{font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:#64748b;font-weight:900;margin-bottom:8px}.template-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.template-card{border:2px solid #cbd5e1;border-radius:16px;padding:12px;background:#f8fafc;cursor:pointer}.template-card:hover{border-color:#2563eb;background:#dbeafe}.template-card.active{border-color:#22c55e;background:#dcfce7}.template-card b{display:block;font-size:15px;margin-bottom:4px}.template-card span{font-size:12px;color:#64748b;font-weight:800}.control-row{display:flex;gap:10px;flex-wrap:wrap}.btn{border:none;background:linear-gradient(135deg,#3b82f6,#2563eb);color:white;padding:10px 13px;border-radius:13px;font-weight:900;cursor:pointer;box-shadow:0 8px 18px rgba(0,0,0,.14);white-space:nowrap}.btn.secondary{background:linear-gradient(135deg,#64748b,#475569)}.btn.good{background:linear-gradient(135deg,#22c55e,#15803d)}.btn.warn{background:linear-gradient(135deg,#f97316,#c2410c)}.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}.btn:hover:not(:disabled){transform:translateY(-1px)}.feedback{border-radius:16px;padding:12px 14px;font-size:15px;font-weight:900;line-height:1.35;display:none;margin-top:12px}.feedback.show{display:block}.feedback.ok{background:#dcfce7;color:#166534}.feedback.no{background:#fee2e2;color:#991b1b}.mini-help{display:grid;gap:6px}.help-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:7px 8px}.help-item b{font-size:11px}.help-item p{font-size:12px;color:#64748b;margin-top:3px;font-weight:700}.overlay{position:fixed;inset:0;background:rgba(2,6,23,.78);display:none;align-items:center;justify-content:center;flex-direction:column;text-align:center;z-index:100;padding:20px}.overlay.show{display:flex}.overlay h2{font-size:42px;margin-bottom:10px}.overlay p{font-size:18px;color:#e5e7eb;max-width:560px;line-height:1.35;margin-botto /* DORADA v5: bolji grafikon, izmjena dimenzija ćelija, italic */
.workbook{position:relative;}
.toolbar{align-items:center;}
.tool-btn.mini{padding:7px 9px;font-size:12px;}
.cell.italic{font-style:italic;}
.col-head,.row-head{position:relative;user-select:none;}
.col-head.resized,.row-head.resized{background:#bbf7d0!important;}
.chart-box{position:absolute!important;right:22px;bottom:18px;width:370px;min-height:205px;max-width:46vw;margin:0!important;z-index:55;box-shadow:0 16px 38px rgba(15,23,42,.28);cursor:default;}
.chart-title{cursor:move;display:flex;align-items:center;justify-content:space-between;gap:8px;background:#f1f5f9;margin:-12px -12px 8px;padding:9px 12px;border-radius:16px 16px 0 0;border-bottom:1px solid #cbd5e1;font-size:13px!important;}

.bar .value-label{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;color:#111827;font-weight:900;background:#fff;border:1px solid #cbd5e1;border-radius:999px;padding:1px 4px;white-space:nowrap;}

/* DORADA v6: veličina ćelija kao u Sheetsu - povlačenje granica */
.sheet{min-width:1364px!important;}
.cell{font-size:15px!important;}
.col-head,.row-head{position:relative!important;overflow:visible!important;}
.col-resizer{position:absolute;right:-4px;top:0;width:8px;height:100%;cursor:col-resize;z-index:20;background:transparent;}
.col-resizer:hover,.col-resizer.active{background:rgba(37,99,235,.28);}

body.resizing-sheet,body.resizing-sheet *{user-select:none!important;}
.resize-guide{position:fixed;z-index:9999;background:#2563eb;color:white;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:900;pointer-events:none;box-shadow:0 8px 20px rgba(0,0,0,.25);}


/* v7: ciljne ćelije su jasno žute, posebno kada ih ima više */

.cell.target.selected{background:#fde68a!important;}

/* v9: ljepši grafikoni + tortni grafikon */
.chart-box{width:340px!important;min-height:188px!important;}
.chart-title{user-select:none;touch-action:none;}
.chart-bars{height:112px!important;}
.bar{background:linear-gradient(180deg,#93c5fd,#2563eb)!important;}
.value-label{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-style:normal;font-size:10px;font-weight:900;color:#334155;background:#f8fafc;border:1px solid #cbd5e1;border-radius:999px;padding:1px 5px;white-space:nowrap;}
.pie-wrap{display:grid;grid-template-columns:120px 1fr;gap:14px;align-items:center;min-height:124px;padding:8px 4px;}
.pie{width:116px;height:116px;border-radius:50%;border:2px solid #cbd5e1;box-shadow:inset 0 0 0 8px rgba(255,255,255,.45),0 8px 18px rgba(15,23,42,.12);}

.pie-item{display:flex;align-items:center;gap:6px;min-width:0;}

@media(max-width:900px){.chart-box{width:310px!important}.pie-wrap{grid-template-columns:100px 1fr}.pie{width:96px;height:96px}}


/* v10: fill handle kao u Sheetsu */
.cell{position:relative;}

  position:absolute;

  z-index:20;

body.dragging-fill{cursor:crosshair!important;user-select:none;}
</style>

<body>
<div class="topbar">
  <div class="logo"><span class="logo-badge"><img class="logo-img" src="https://nihadm97.github.io/Portfolio/static/media/logo.7156bdbd7cb0672472b8.png" alt="Logo"></span> Laboratorija proračunskih tablica</div>
  <div class="top-info"><div class="pill" id="levelIndicator">Nivo 1 / 58</div><div class="pill" id="modeIndicator">Uvod</div><select class="level-select" id="levelSelect" onchange="jumpToLevel()"></select></div>
</div>
<div class="main">
  <section class="sheet-panel">
    <div class="workbook">
      <div class="formula-row"><div class="name-box" id="nameBox">A1</div><input class="formula-input" id="formulaInput" placeholder="Klikni ćeliju pa upiši tekst, broj ili formulu npr. =SUM(B2:B6)"><button class="write-btn" onclick="commitFormula()">Upiši</button></div>
      <div class="toolbar">
        <select class="tool-select" id="formatSelect" onchange="setFormat(this.value)"><option value="automatic">Automatski</option><option value="number">Broj</option><option value="date">Datum</option><option value="currency">Valuta KM</option><option value="percent">Procenat</option></select>
        <button class="tool-btn" onclick="toggleBold()">B</button><button class="tool-btn" onclick="setFill('yellow')">Žuta</button><button class="tool-btn" onclick="setFill('green')">Zelena</button><button class="tool-btn" onclick="setFill('blue')">Plava</button><button class="tool-btn" onclick="changeDecimals(1)">+ decimala</button><button class="tool-btn" onclick="changeDecimals(-1)">− decimala</button><button class="tool-btn" onclick="deleteCell()">Obriši</button><button class="tool-btn" onclick="insertChart()">Stupčasti grafikon</button><button class="tool-btn" onclick="insertPieChart()">Tortni grafikon</button><button class="tool-btn" onclick="sortSelection()">Sortiraj raspon</button>
      </div>
      <div class="sheet-wrap"><div class="sheet" id="sheet"></div></div>
      <div class="chart-box" id="chartBox"><div class="chart-title" id="chartTitle">Grafikon</div><div class="chart-bars" id="chartBars"></div></div>
    </div>
  </section>
  <aside class="side-panel">
    <div class="task-card"><div class="chapter" id="chapterBadge">📌 Pojam</div><div class="task-title" id="taskTitle">Naslov zadatka</div><div class="task-text" id="taskText">Opis zadatka.</div><div class="feedback" id="feedback"></div></div>
    <div class="concept" id="conceptBox"><b>Objašnjenje</b><p id="conceptText">Kratko objašnjenje novog pojma.</p></div>
    <div class="action-panel" id="templatePanel"><div class="action-title">Gotovi predlošci</div><div class="template-grid" id="templateGrid"></div></div>
    <div class="action-panel"><div class="action-title">Pomoć za rad</div><div class="mini-help" id="helpList"></div></div>
    <div class="action-panel"><div class="action-title">Kontrole</div><div class="control-row"><button class="btn good" onclick="checkLevel()">Provjeri</button><button class="btn secondary" onclick="resetLevel()">Vrati nivo</button><button class="btn warn" onclick="nextLevel()" id="nextBtn" disabled>Sljedeći nivo</button></div></div>
  </aside>
</div>
<div class="overlay" id="overlay"><h2 id="overlayTitle">Bravo!</h2><p id="overlayText">Nivo je završen.</p><button class="btn secondary" onclick="closeOverlay()">Zatvori</button></div>
<script>
const ROWS=14,COLS=12,letters='ABCDEFGHIJKL'.split('');
let cells={},active='A1',selection=[],dragging=false,dragStart=null,currentLevel=0,completed={},chartInserted=false,chartRange='',chosenTemplate=null,formulaTarget='A1',formulaPickMode=false;
let editingCell=null,editingInput=null,formulaPickBase='';
const sheet=document.getElementById('sheet'),formulaInput=document.getElementById('formulaInput'),nameBox=document.getElementById('nameBox');
formulaInput.addEventListener('focus',()=>{formulaTarget=active});
formulaInput.addEventListener('input',()=>{formulaPickMode=formulaInput.value.trim().startsWith('=');formulaPickBase=''});
formulaInput.addEventListener('keydown',e=>{if(e.key==='Enter')commitFormula()});
const templates={
 budget:{name:'Budžet izleta',desc:'Troškovi prevoza, hrane i ulaznica.',data:[['Stavka','Iznos'],['Prevoz',120],['Hrana',85],['Ulaznice',60],['Materijal',35],['Ukupno','']]},
 grades:{name:'Evidencija ocjena',desc:'Imena učenika i ocjene po predmetu.',data:[['Učenik','Ocjena'],['Amina',5],['Emir',4],['Sara',5],['Mak',3],['Prosjek','']]},
 attendance:{name:'Prisustvo',desc:'Broj prisutnih učenika po danima.',data:[['Dan','Prisutni'],['Ponedjeljak',22],['Utorak',20],['Srijeda',24],['Četvrtak',21],['Petak',23]]},
 shop:{name:'Školska prodavnica',desc:'Proizvodi, cijene i količine.',data:[['Proizvod','Cijena','Količina'],['Sveska',2,12],['Olovka',1,30],['Marker',3,8],['Papir',5,6]]}
};
function blankCells(){cells={};for(let r=1;r<=ROWS;r++){for(let c=0;c<COLS;c++){cells[letters[c]+r]={v:'',formula:'',fmt:'automatic',dec:null,bold:false,fill:''}}}}
function setCell(addr,v,extra={}){if(!cells[addr])return;cells[addr]={...cells[addr],v,formula:String(v).startsWith('=')?String(v):'',...extra}}
function getCell(addr){return cells[addr]?.v??''}
function addr(c,r){return letters[c]+r}
function parseAddr(a){const m=String(a).toUpperCase().match(/^([A-L])(\d{1,2})$/);if(!m)return null;const r=+m[2];if(r<1||r>ROWS)return null;return {c:letters.indexOf(m[1]),r}}

function todayStr(){const d=new Date();return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}.`}
function parseDateValue(v){if(v instanceof Date)return v;let s=String(v).trim();let m=s.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{4})\.?$/);if(m)return new Date(+m[3],+m[2]-1,+m[1]);m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);if(m)return new Date(+m[1],+m[2]-1,+m[3]);return new Date(s)}
function evalFormula(f){let s=String(f).trim();if(!s.startsWith('='))return s;s=s.slice(1).toUpperCase().replace(/\s+/g,'');let m;if((m=s.match(/^SUM\(([^)]+)\)$/)))return nums(m[1]).reduce((a,b)=>a+b,0);if((m=s.match(/^COUNT\(([^)]+)\)$/)))return nums(m[1]).length;if((m=s.match(/^AVERAGE\(([^)]+)\)$/))){const n=nums(m[1]);return n.length?n.reduce((a,b)=>a+b,0)/n.length:''}if((m=s.match(/^MAX\(([^)]+)\)$/))){const n=nums(m[1]);return n.length?Math.max(...n):''}if((m=s.match(/^MIN\(([^)]+)\)$/))){const n=nums(m[1]);return n.length?Math.min(...n):''}if(s==='NOW()')return todayStr();if((m=s.match(/^DAY\(([^)]+)\)$/))){let d=parseDateValue(getCell(m[1]));return Number.isNaN(d.getTime())?'':d.getDate()}if((m=s.match(/^MONTH\(([^)]+)\)$/))){let d=parseDateValue(getCell(m[1]));return Number.isNaN(d.getTime())?'':d.getMonth()+1}if((m=s.match(/^YEAR\(([^)]+)\)$/))){let d=parseDateValue(getCell(m[1]));return Number.isNaN(d.getTime())?'':d.getFullYear()}if((m=s.match(/^WEEKDAY\(([^)]+)\)$/))){let d=parseDateValue(getCell(m[1]));return Number.isNaN(d.getTime())?'':d.getDay()+1}if((m=s.match(/^SORT\(([^)]+)\)$/))){return valuesFromRange(m[1]).slice().sort((a,b)=>String(a).localeCompare(String(b),'bs',{numeric:true}))}return '#GREŠKA'}

function formulaMode(v){
  v=String(v||'').trim();
  const i=v.lastIndexOf('(');

  if(i>=0 && i>j && /^=[A-Z]+\(/i.test(v.slice(0,i+1)))return 'rangeFunction';

function targetAddrsForLevel(L=levels[currentLevel]){
  const out=new Set();
  if(!L)return [];
  if(L.target)out.add(L.target);
  (L.targets||[]).forEach(a=>out.add(a));
  if(L.expectFormulas)Object.keys(L.expectFormulas).forEach(a=>out.add(a));
  if(L.expectFill?.range)rangeAddrs(L.expectFill.range).forEach(a=>out.add(a));

      if(data.fmt==='date')el.classList.add('fmt-date');

renderSheet=function(){

      if(data.fill)el.classList.add('fill-'+data.fill);
      if(targetAddrsForLevel().includes(a))el.classList.add('target');
      el.onmousedown=(ev)=>{
        if(ev.detail>=2){ev.preventDefault();ev.stopPropagation();dragging=false;return;}
        if(editingInput&&document.body.contains(editingInput)&&!isFormulaPicking()){return;}
        dragging=true;dragStart=a;selection=[a];
        if(isFormulaPicking()){formulaPickBase='';previewRangeInFormula();updateSelectionClasses();return;}

      el.ondblclick=(ev)=>{ev.preventDefault();ev.stopPropagation();dragging=false;editCellInline(a)};

function safeNumberForFormula(v){const n=Number(String(v).replace(',','.'));return Number.isFinite(n)?n:0}
const oldEvalFormulaV5=evalFormula;
evalFormula=function(f){
  let s=String(f).trim();
  if(!s.startsWith('='))return s;
  const first=oldEvalFormulaV5(f);
  if(first!=='#GREŠKA')return first;
  let expr=s.slice(1).toUpperCase().replace(/([A-L]\d{1,2})/g,(m)=>String(safeNumberForFormula(getCell(m))));
  if(!/^[0-9+\-*/().,\s]+$/.test(expr))return '#GREŠKA';
  try{const val=Function('"use strict";return ('+expr.replace(/,/g,'.')+')')();return Number.isFinite(val)?Math.round(val*1000)/1000:'#GREŠKA'}catch(e){return '#GREŠKA'}
}

/* v9: stabilno pomjeranje grafikona i tortni grafikon */
makeChartDraggable=function(){
  const box=document.getElementById('chartBox'), head=document.getElementById('chartTitle');
  if(!box||!head||box.dataset.dragReadyV9)return;
  box.dataset.dragReadyV9='1';
  let down=false,dx=0,dy=0,parentRect=null;
  head.addEventListener('mousedown',e=>{
    down=true;
    const parent=box.offsetParent || box.parentElement;
    parentRect=parent.getBoundingClientRect();
    const r=box.getBoundingClientRect();
    const left=r.left-parentRect.left;
    const top=r.top-parentRect.top;
    box.style.left=left+'px';
    box.style.top=top+'px';
    box.style.right='auto';
    box.style.bottom='auto';
    dx=e.clientX-r.left;
    dy=e.clientY-r.top;
    document.body.classList.add('dragging-chart');
    e.preventDefault();e.stopPropagation();
  });
  window.addEventListener('mousemove',e=>{
    if(!down)return;
    const parent=box.offsetParent || box.parentElement;
    parentRect=parentRect || parent.getBoundingClientRect();
    const maxLeft=Math.max(8,parent.clientWidth-box.offsetWidth-8);
    const maxTop=Math.max(8,parent.clientHeight-box.offsetHeight-8);
    const left=Math.max(8,Math.min(maxLeft,e.clientX-parentRect.left-dx));
    const top=Math.max(8,Math.min(maxTop,e.clientY-parentRect.top-dy));
    box.style.left=left+'px';
    box.style.top=top+'px';
  });
  window.addEventListener('mouseup',()=>{if(down){down=false;document.body.classList.remove('dragging-chart');parentRect=null;}});
};
function chartPairsFromSelection(){

    let row=rows[r];let keys=Object.keys(row).map(Number).sort((a,b)=>a-b);let vals=keys.map(k=>row[k]);

}

function insertPieChart(){
  const pairs=chartPairsFromSelection();

  chartInserted=true;chartRange=rangeTextFromSelection();placeChartBox();
  document.getElementById('chartTitle').textContent='Tortni grafikon: '+(chartRange||'odabrani raspon');
  const total=pairs.reduce((s,p)=>s+p[1],0)||1;
  const colors=['#60a5fa','#22c55e','#f97316','#a78bfa','#facc15','#ef4444','#14b8a6','#94a3b8'];
  let start=0,parts=[];
  pairs.slice(0,8).forEach((p,i)=>{const deg=p[1]/total*360;parts.push(`${colors[i]} ${start}deg ${start+deg}deg`);start+=deg;});
  const bars=document.getElementById('chartBars');bars.className='pie-wrap';

function checkAllFormulas(map){return Object.entries(map).every(([a,f])=>normFormula(cells[a].formula)===normFormula(f) && evalFormula(cells[a].formula)!=='#GREŠKA')}
function checkAllFill(range,color){return rangeAddrs(range).every(a=>cells[a].fill===color)}
function checkAllBold(range){return rangeAddrs(range).every(a=>!!cells[a].bold)}
function checkAllFmt(obj){return rangeAddrs(obj.range).every(a=>cells[a].fmt===obj.fmt && (obj.dec===undefined || cells[a].dec===obj.dec))}
function isRangeSorted(range){const vals=rangeAddrs(range).map(a=>getCell(a)).filter(v=>String(v).trim()!=='');if(vals.length<2)return false;return vals.every((v,i)=>i===0||String(vals[i-1]).localeCompare(String(v),'bs',{numeric:true})<=0)}

checkLevel=function(){
  const L=levels[currentLevel];let ok=true,msg='Bravo, tačno je.';
  if(L.needTemplate){ok=chosenTemplate===L.needTemplate;msg=ok?'Tačno, otvorio/otvorila si pravi predložak.':'Nije taj predložak. Pogledaj naziv koji se traži u zadatku.'}
  if(ok&&L.expectValue!==undefined){ok=almost(getCell(L.target),L.expectValue);msg=ok?'Tačno, ćelija ima traženi sadržaj.':`Provjeri ćeliju ${L.target}.`}
  if(ok&&L.expectFmt){ok=cells[L.target].fmt===L.expectFmt;msg=ok?'Tačno, format je dobro postavljen.':`Ćelija ${L.target} još nema traženi format.`}
  if(ok&&L.expectDec!==undefined){ok=cells[L.target].dec===L.expectDec;msg=ok?'Tačno, decimalna mjesta su dobro podešena.':'Podesi tačno 2 decimalna mjesta.'}
  if(ok&&L.expectFormula){ok=normFormula(cells[L.target].formula)===normFormula(L.expectFormula);msg=ok?'Tačno, formula je unesena i rezultat je ispravan.':`Formula u ${L.target} nije dobra. Treba koristiti ${L.expectFormula}.`}
  if(ok&&L.expectFormulas){ok=checkAllFormulas(L.expectFormulas);msg=ok?'Tačno, sve tražene formule su unesene.':'Provjeri sve tražene formule u zadatku.'}
  if(ok&&L.needSelection&&!L.needChart){const req=rangeAddrs(L.needSelection).sort().join(',');ok=selection.slice().sort().join(',')===req;msg=ok?msg:'Označi tačan raspon ćelija naveden u zadatku.'}
  if(ok&&L.needSortedRange){ok=isRangeSorted(L.needSortedRange);msg=ok?msg:`Raspon ${L.needSortedRange} još nije sortiran ili nema dovoljno unesenih podataka.`}
  if(ok&&L.needChart){ok=chartInserted;msg=ok?msg:'Još treba ubaciti grafikon iz označenog raspona.'}
  if(ok&&L.expectFill){ok=checkAllFill(L.expectFill.range,L.expectFill.color);msg=ok?msg:`Provjeri boju ćelija u rasponu ${L.expectFill.range}.`}
  if(ok&&L.expectBold){ok=!!cells[L.target].bold;msg=ok?msg:`Ćelija ${L.target} još nije boldirana.`}
  if(ok&&L.expectItalic){ok=!!cells[L.target].italic;msg=ok?msg:`Ćelija ${L.target} još nije italic.`}

function currentFormulaSourceV8(){
  if(editingInput && document.body.contains(editingInput) && String(editingInput.value).trim().startsWith('=')){
    return {input:editingInput,target:editingCell,type:'cell'};
  }
  if(document.activeElement===formulaInput && String(formulaInput.value).trim().startsWith('=')){
    return {input:formulaInput,target:formulaTarget||active,type:'bar'};
  }
  if(String(formulaInput.value).trim().startsWith('=') && formulaPickMode){
    return {input:formulaInput,target:formulaTarget||active,type:'bar'};
  }
  return null;
}
function formulaModeV8(v){
  v=String(v||'').trim();
  const i=v.lastIndexOf('('), j=v.lastIndexOf(')');
  if(i>=0 && i>j && /^=[A-Z]+\(/i.test(v.slice(0,i+1)))return 'rangeFunction';
  return 'reference';
}
function formulaInsertBaseV8(input){
  const v=String(input.value||'');
  const pos=(typeof input.selectionStart==='number')?input.selectionStart:v.length;
  const before=v.slice(0,pos), after=v.slice(pos);
  if(formulaModeV8(v)==='rangeFunction'){

    next=formulaPointerBase.before+rng+')';

  src.input.value=next;
  if(src.type==='cell')formulaInput.value=next;
  else {formulaTarget=src.target||active;active=formulaTarget;nameBox.textContent=active;}
  setTimeout(()=>{src.input.focus();try{src.input.setSelectionRange(src.input.value.length,src.input.value.length)}catch(e){}},0);
}
function cellFromEventV8(ev){

function compactDateFunctionLevelsV10(){
  const keep={DAY:0,MONTH:0,YEAR:0,WEEKDAY:0};
  for(let i=levels.length-1;i>=0;i--){
    const L=levels[i];
    const m=String(L.name||'').match(/^(DAY|MONTH|YEAR|WEEKDAY) primjer/i);
    if(m){
      const fn=m[1].toUpperCase();
      keep[fn]++;
      if(keep[fn]>1)levels.splice(i,1);
    }
  }
  const dayIndex=levels.findIndex(L=>/^DAY primjer/i.test(String(L.name||'')));
  const combined={
    icon:'📅',mode:'Funkcije',chapter:'Funkcije DAY, MONTH, YEAR i WEEKDAY',name:'Datum razdvoji na korisne podatke',
    concept:'DAY, MONTH, YEAR i WEEKDAY se često koriste zajedno: iz jednog datuma dobijemo dan, mjesec, godinu i broj dana u sedmici.',
    task:'U B2 je datum. U C2 upiši =DAY(B2), u D2 =MONTH(B2), u E2 =YEAR(B2), a u F2 =WEEKDAY(B2).',
    setup:()=>{setHeaders(['Događaj','Datum','Dan','Mjesec','Godina','Dan u sedmici']);setCell('A2','Posjeta muzeju');setCell('B2','09.06.2026.',{fmt:'date'});},
    expectFormulas:{C2:'=DAY(B2)',D2:'=MONTH(B2)',E2:'=YEAR(B2)',F2:'=WEEKDAY(B2)'}
  };
  if(!levels.some(L=>L.name===combined.name)){
    if(dayIndex>=0)levels.splice(dayIndex+4,0,combined); else levels.push(combined);
  }
}

function shiftFormulaRefsV10(formula, rowDelta, colDelta){
  return String(formula||'').replace(/(\$?)([A-L])(\$?)(\d{1,2})/g,(m,colAbs,letter,rowAbs,row)=>{
    let c=letters.indexOf(letter.toUpperCase());
    let r=Number(row);
    if(!colAbs)c=Math.max(0,Math.min(COLS-1,c+colDelta));
    if(!rowAbs)r=Math.max(1,Math.min(ROWS,r+rowDelta));
    return (colAbs?'$':'')+letters[c]+(rowAbs?'$':'')+r;
  });
}

/* ===== v11: automatske širine gdje tekst ne treba biti sakriven + veliki završni zadaci ===== */
function autoFitVisibleContentV11(L){
  if(!L || L.mode==='Dimenzije' || L.expectCol || L.expectRow || L.noAutoFit)return;
  const minW=110, maxW=210;
  const wanted=Array(COLS).fill(minW);
  Object.entries(cells).forEach(([a,d])=>{
    const p=parseAddr(a); if(!p)return;
    const raw=(d.formula && d.formula.trim()) ? d.formula : (d.v===undefined||d.v===null?'':String(d.v));
    if(!raw)return;
    const len=String(raw).length;
    let w=Math.min(maxW,Math.max(minW,48+len*8));
    if(p.r===1)w=Math.min(maxW,Math.max(w,62+len*8));
    wanted[p.c]=Math.max(wanted[p.c],w);
  });
  // Daj malo prostora kolonama u kojima učenik treba upisivati formule ili duže rezultate.
  targetAddrsForLevel(L).forEach(a=>{const p=parseAddr(a); if(p)wanted[p.c]=Math.max(wanted[p.c],138)});
  colWidths=wanted;
  rowHeights=Array(ROWS).fill(42);
  // Naslovni red neka bude malo viši ako ima duže naslove, ali samo kad nije lekcija o visini reda.
  const headerLong=Object.entries(cells).some(([a,d])=>{const p=parseAddr(a);return p&&p.r===1&&String(d.v||'').length>12});
  if(headerLong)rowHeights[0]=46;
}

let __calcStackV15=[];
const rawGetCellV15 = getCell;
getCell = function(a){
  a = String(a||'').toUpperCase();
  if(!cells[a]) return '';
  const cell = cells[a];
  if(cell.formula){
    if(__calcStackV15.includes(a)) return '';
    __calcStackV15.push(a);
    let val = evalFormula(cell.formula);
    __calcStackV15.pop();
    return Array.isArray(val) ? (val[0] ?? '') : val;
  }
  return cell.v ?? '';
};

displayCell = function(a){
  let d = cells[a];
  if(!d) return '';
  let v = getCell(a);
  if(Array.isArray(v)) return v.join(', ');
  if(v==='' || v===null || v===undefined) return '';
  if(d.fmt==='number' && d.dec!==null && !Number.isNaN(Number(v))) return Number(v).toFixed(d.dec);
  if(d.fmt==='currency' && d.dec!==null && !Number.isNaN(Number(v))) return Number(v).toFixed(d.dec);
  if(d.fmt==='percent' && d.dec!==null && !Number.isNaN(Number(v))) return Number(v).toFixed(d.dec);
  return String(v);
};

    if(ok&&L.expectFmtRange){ok=checkAllFmt(L.expectFmtRange);msg=ok?msg:`Provjeri format u rasponu ${L.expectFmtRange.range}.`;}

    if(ok&&L.expectRow){const h=rowHeights[L.expectRow.r-1];ok=(L.expectRow.min===undefined||h>=L.expectRow.min)&&(L.expectRow.max===undefined||h<=L.expectRow.max);msg=ok?msg:'Provjeri visinu traženog reda.';}
    if(ok&&L.needSelection&&!L.needChart){const req=rangeAddrs(L.needSelection).sort().join(',');ok=selection.slice().sort().join(',')===req;msg=ok?msg:'Označi tačan raspon ćelija naveden u zadatku.';}
    if(ok){completed[currentLevel]=true;document.getElementById('nextBtn').disabled=false;flash(msg,'ok');showOverlay('Bravo!',msg+' Prelazim na sljedeći nivo.');setTimeout(()=>{closeOverlay();nextLevel()},850);}
    else{flash(msg+' Ispravi zadatak ili klikni “Vrati nivo” ako želiš početi ponovo.','no');}
  };

  setupSelect(); resetLevel();
})();

/* ===== v21: težina samo bojom, bez tekstualnih oznaka ===== */
(function(){
  const css=document.createElement('style');
  css.textContent=`
    .level-select.diff-easy{background:#dcfce7!important;color:#166534!important;border:2px solid #22c55e!important;box-shadow:0 0 0 3px rgba(34,197,94,.18)!important;}
    .level-select.diff-medium{background:#ffedd5!important;color:#9a3412!important;border:2px solid #f97316!important;box-shadow:0 0 0 3px rgba(249,115,22,.18)!important;}
    .level-select.diff-hard{background:#fee2e2!important;color:#991b1b!important;border:2px solid #ef4444!important;box-shadow:0 0 0 3px rgba(239,68,68,.18)!important;}
    .level-select option.diff-easy-option{background:#dcfce7!important;color:#166534!important;}
    .level-select option.diff-medium-option{background:#ffedd5!important;color:#9a3412!important;}
    .level-select option.diff-hard-option{background:#fee2e2!important;color:#991b1b!important;}
    .chapter.diff-easy{background:#dcfce7!important;color:#166534!important;border-color:#86efac!important;}
    .chapter.diff-medium{background:#ffedd5!important;color:#9a3412!important;border-color:#fdba74!important;}
    .chapter.diff-hard{background:#fee2e2!important;color:#991b1b!important;border-color:#fca5a5!important;}
  `;
  document.head.appendChild(css);

  function dClass(d){return d==='hard'?'diff-hard':(d==='medium'?'diff-medium':'diff-easy');}
  function optionClass(d){return d==='hard'?'diff-hard-option':(d==='medium'?'diff-medium-option':'diff-easy-option');}
  function applySelectDifficulty(){
    const s=document.getElementById('levelSelect');
    const L=levels[currentLevel];
    if(!s||!L)return;
    s.classList.remove('diff-easy','diff-medium','diff-hard');
    s.classList.add(dClass(L.difficulty));
  }

  setupSelect=function(){
    const s=document.getElementById('levelSelect'); if(!s)return;
    s.innerHTML='';
    levels.forEach((L,i)=>{
      const o=document.createElement('option');
      o.value=i;
      o.textContent=`Nivo ${i+1}: ${L.name}`;
      o.className=optionClass(L.difficulty);
      s.appendChild(o);
    });
    applySelectDifficulty();
  };

  const prevRenderAll=renderAll;
  renderAll=function(){
    prevRenderAll();
    const L=levels[currentLevel];
    const badge=document.getElementById('chapterBadge');
    if(badge&&L){
      badge.classList.remove('difficulty-easy','difficulty-medium','difficulty-hard','diff-easy','diff-medium','diff-hard');
      badge.classList.add(dClass(L.difficulty));
      badge.textContent=L.chapter;
    }
    applySelectDifficulty();
  };

  setupSelect();
  renderAll();
})();


/* ===== v22: korekcije nivoa 27/28 i naziv kategorije Funkcije ===== */
(function(){
  function setH(headers){
    if(typeof setHeaders==='function') setHeaders(headers);
    else headers.forEach((h,i)=>setCell(addr(i,1),h,{bold:true,fill:'blue'}));
  }
  const formula27={
    icon:'🧮',mode:'Formule',chapter:'Računske formule',name:'Kombinovana formula sa bonusom',difficulty:'medium',
    concept:'Srednje težak zadatak kombinuje više ćelija i više računskih operacija u jednoj formuli.',
    task:'U E2 izračunaj ukupan rezultat formulom =B2+C2+D2*2. Formula sabira test i projekat, a bonus množi sa 2.',
    setup:()=>{setH(['Učenik','Test','Projekt','Bonus','Ukupno']);setCell('A2','Amina');setCell('B2',18);setCell('C2',22);setCell('D2',3);},
    target:'E2',expectFormula:'=B2+C2+D2*2'
  };
  const formula28={
    icon:'➗',mode:'Formule',chapter:'Računske formule',name:'Ukupan trošak podijeljen na učenike',difficulty:'medium',
    concept:'Zagrade se koriste kada prvo treba sabrati više ćelija, pa tek onda rezultat podijeliti.',
    task:'U F2 izračunaj cijenu po učeniku formulom =(B2+C2+D2)/E2. Prvo saberi tri troška, pa ih podijeli brojem učenika.',
    setup:()=>{setH(['Izlet','Prevoz','Ulaznice','Hrana','Učenika','Po učeniku']);setCell('A2','Sarajevo');setCell('B2',120);setCell('C2',90);setCell('D2',150);setCell('E2',30);},
    target:'F2',expectFormula:'=(B2+C2+D2)/E2'
  };

  // 27. i 28. nivo: srednja težina i stvarno kombinovanje više ćelija.
  if(levels[26]) levels[26]=formula27;
  if(levels[27]) levels[27]=formula28;

  // Izbaci trenutne nivoe 60 i 61 jer su ponavljanje nivoa 59.
  if(levels.length>=61) levels.splice(59,2);

  // Od 31. nivoa pa do miješanih zadataka treba pisati Funkcije, ne Formule.
  for(let i=30;i<levels.length;i++){
    const L=levels[i];
    if(!L || L.mode==='Miješano') break;
    L.mode='Funkcije';
    if(String(L.chapter||'').includes('Računske formule')) L.chapter='Funkcije';
    if(String(L.chapter||'').startsWith('Funkcija ')) L.chapter=String(L.chapter).replace('Funkcija ','Funkcije ');
  }

  completed={};
  currentLevel=Math.min(currentLevel,levels.length-1);
  if(typeof setupSelect==='function') setupSelect();
  if(typeof resetLevel==='function') resetLevel();
})();

</script>
